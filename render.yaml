services:
  - type: web
    name: deneyap-depo-yonetim
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10
      - key: DATABASE_URL
        value: sqlite:///./deneyap_depo.db
