services:
  - type: web
    name: deneyap-depo-yonetim
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "cd backend && gunicorn -w 2 -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:$PORT"
    envVars:
  - key: DATABASE_URL
    value: "sqlite:///deneyap_depo.db"
