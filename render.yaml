services:
  - type: web
    name: deneyap-depo-yonetim
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "cd backend && gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10
      - key: PYTHONPATH
        value: .
      - key: DATABASE_URL
        fromDatabase:
          name: deneyap-db
          property: connectionString

databases:
  - name: deneyap-db
    plan: free
